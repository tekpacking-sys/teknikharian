    const showToast = (message, isError = false) => {

        } else {

        }

    const setupAutocomplete = (input) => {
        let suggestionBox = document.createElement("div");
        suggestionBox.className = "custom-autocomplete-list";
        input.parentNode.appendChild(suggestionBox);
        input.addEventListener('input', () => {
            const fullVal = input.value;
            const parts = fullVal.split(','); 
            const lastPart = parts[parts.length - 1].trim().toLowerCase(); 
            if (lastPart.length === 0) { suggestionBox.style.display = "none"; return; }
            if (lastPart.length === 1 && shortcutMap[lastPart]) {
                suggestionBox.innerHTML = "";
                suggestionBox.style.display = "block";
                shortcutMap[lastPart].forEach(item => {
                    const div = document.createElement("div");
                    div.className = "custom-autocomplete-item";
                    div.textContent = item;
                    div.onclick = (e) => {
                        e.preventDefault();
                        const prefix = parts.slice(0, -1).join(',');
                        input.value = prefix ? `${prefix}, ${item}` : item;
                        suggestionBox.style.display = "none";
                        input.focus();
                    };
                    suggestionBox.appendChild(div);
                });
            } else { suggestionBox.style.display = "none"; }
        });
        document.addEventListener("click", (e) => { if (e.target !== input) suggestionBox.style.display = "none"; });
    };

const darkToggle = document.getElementById("darkToggle");

function setDarkMode(isDark) {
    document.body.classList.toggle("dark", isDark);
    localStorage.setItem("darkMode", isDark ? "1" : "0");
    darkToggle.textContent = isDark ? "☀️" : "🌙";
}

// Load status saat halaman dibuka
const savedDark = localStorage.getItem("darkMode") === "1";
setDarkMode(savedDark);

// Toggle klik
darkToggle.onclick = () => {
    const isDark = !document.body.classList.contains("dark");
    setDarkMode(isDark);
};
