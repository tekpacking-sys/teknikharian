<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<title>Laporan Shift Teknik Packing</title>
<style>
    body {
        background-color: beige;
        font-family: sans-serif;
    }
    .form {
        border: 1px solid #ccc;
        border-radius: 10px;
        padding: 10px;
        max-width: 500px;
    }
    .form-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    label {
        font-weight: bold;
        flex: 1;
    }
    input, select, textarea {
        background-color: #0001;
        border: 1px solid #0006;
        border-radius: 3px;
        width: 60%;
        padding: 5px;
        box-sizing: border-box;
        font-size: 14px;
    }
    .area-group {
        display: none;
        margin-top: 10px;
    }
    .send {
        background-color: teal;
        border: none;
        border-radius: 5px;
        color: white;
        margin-left: 25%;
        margin-top: 10px;
        padding: 10px;
        cursor: pointer;
    }
    
    /* Background kotak Select2 */
.select2-container--default .select2-selection--multiple {
    background-color: #0001;
    border: 1px solid #0006;
    min-height: 35px;
}

/* Background item yang dipilih */
.select2-container--default .select2-selection--multiple .select2-selection__choice {
    background-color: teal;
    border: 1px solid teal;
    color: white;
    border-radius: 4px;
    padding: 2px 8px;
}

/* Tombol silang hapus */
.select2-container--default .select2-selection__choice__remove {
    color: white;
    margin-right: 5px;
}

.select2-container--default .select2-selection__choice__remove:hover {
    color: red;
}

/* Background dropdown pilihan */
.select2-container--default .select2-results__option {
    background-color: #333;
    color: #fff;
}

/* Warna saat item disorot */
.select2-container--default .select2-results__option--highlighted {
    background-color: teal !important;
    color: white;
}
    .custom-autocomplete-list {
        position: absolute; z-index: 100; background: white; border: 1px solid #ccc;
        border-radius: 5px; width: 60%; right: 5px; max-height: 150px; overflow-y: auto;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: none;
    }
    .custom-autocomplete-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; color: #333; font-size: 14px; }
</style>
</head>

<body>
<h3>Laporan Shift Teknik Packing</h3>

<div class="form">

    <div class="form-row">
        <label>Hari/Tgl</label>
        <input type="date" id="tanggal">
    </div>

    <div class="form-row">
        <label>Shift</label>
        <select id="shift">
            <option value="">Pilih Shift</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
        </select>
    </div>

    <div class="form-row">
    <label>Nama Personil</label>
    <select class="select2-multi" multiple="multiple" style="width: 60%;">
        <option>Azis Muslim</option>
        <option>Budi Narto</option>
        <option>Acep Apandi</option>
        <option>Dede Sulaeman</option>
        <option>Ali Sabana</option>
        <option>Tidar Akbar</option>
        <option>Maryadi</option>
        <option>Irwansyah</option>
        <option>Agus Surono</option>
        <option>Sapto Kuncoro</option>
        <option>Agus Karna</option>
        <option>Heri Setiadi</option>
        <option>Sudarto</option>
        <option>Alfi SR</option>
        <option>Andi Budianto</option>
        <option>Taupik</option>
        <option>Heri Gunawan</option>
        <option>Rahmat Herdiyanto</option>
        <option>Sandra Zulkifli</option>
        <option>Dodi Priyonggo</option>
        <option>Eka Satya W</option>
        <option>Rahmat</option>
    </select>
</div>

    <div class="form-row">
        <label>Area</label>
        <select id="area" onchange="pilihArea()">
            <option value="">Pilih Area</option>
            <option value="yupi1">Yupi 1</option>
            <option value="yupi34">Yupi 3/4</option>
            <option value="yupi5">Yupi 5</option>
        </select>
    </div>

<!--- YUPI 1 --->
    <div id="yupi1" class="area-group">
        <div class="form-row">
            <label>PP</label>
            <input type="text" id="starchless">
        </div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jstarchless">
        </div>
    </div>

<!--- YUPI 3/4 --->
    <div id="yupi34" class="area-group">
        <div class="form-row"><label>Ishida 1</label><input type="text" id="ishida"></div>
        <div class="form-row"><label>Ishida 2</label><input type="text" id="ishida1"></div>
        <div class="form-row"><label>Kawashima</label><input type="text" id="kawashima"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jkawashima">
        </div>
        <div class="form-row"><label>Multipond</label><input type="text" id="multipond"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jmultipond">
        </div>
        <div class="form-row"><label>PP</label><input type="text" id="pp3"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jpp3">
        </div>
        <div class="form-row"><label>Dippy</label><input type="text" id="dippy"></div>
        <div class="form-row"><label>Animal</label><input type="text" id="animal"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="janimal">
        </div>
        <div class="form-row"><label>Animal line 2</label><input type="text" id="animal2"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="janimal2">
        </div>
        <div class="form-row"><label>MB/G Fries</label><input type="text" id="gfries"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jgfries">
        </div>
        <div class="form-row"><label>Cup Sealer</label><input type="text" id="noodle"></div>
        <div class="form-row"><label>Berrybonz</label><input type="text" id="berry"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jberry">
        </div>
        <div class="form-row"><label>Crunchy</label><input type="text" id="crunchy"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jcrunchy">
        </div>
    </div>

<!--- YUPI 5 --->
    <div id="yupi5" class="area-group">
        <div class="form-row"><label>Ishida</label><input type="text" id="ishida2"></div>
        <div class="form-row"><label>Kawashima</label><input type="text" id="kwshima"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jkwshima">
        </div>
        <div class="form-row"><label>Cup Sealer</label><input type="text" id="tl"></div>
        <div class="form-row"><label>Sandwich</label><input type="text" id="sandwich"></div>
        <div class="form-row"><label>PP</label><input type="text" id="pp5"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jpp5">
        </div>
        <div class="form-row"><label>MB</label><input type="text" id="mb5"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jmb5">
        </div>
        <div class="form-row"><label>MB Max</label><input type="text" id="max"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jmax">
        </div>
        <div class="form-row"><label>Rollete</label><input type="text" id="rollete"></div>
        <div class="form-row">
            <label>Jumlah</label>
            <input type="number" id="jrollete">
        </div>
    </div>

    <hr>

    <div class="form-row">
        <label>NOTE PEKERJAAN</label>
        <textarea id="kerusakan" rows="5"></textarea>
    </div>
    
    <div class="form-row">
        <button type="button" onclick="kirimKeWA()" class="send">
            Kirim ke WhatsApp grup
        </button>
    </div>
 </div>
</div>

<script>
function pilihArea() {
    document.getElementById("yupi1").style.display = "none";
    document.getElementById("yupi34").style.display = "none";
    document.getElementById("yupi5").style.display = "none";

    const area = document.getElementById("area").value;

    if (area) {
        document.getElementById(area).style.display = "block";
    }
}
    $(document).ready(function() {
    $('.select2-multi').select2({
        placeholder: "Pilih Nama",
        allowClear: true
    }).on('change', saveData); // Auto-save saat pilihan berubah

    // Muat data yang tersimpan
    loadData();

    document.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('input', saveData);
    });
});

    // Fungsi Auto complete
    const shortcutMap = {
        a: ["Animal", "Appeton", "Apple ring", "Aquarium"],
        b: ["Baby Shark", "Bear", "Berrybonz"],
        c: ["Calci Bean", "CDZ", "Chocoo Glee", "Chop chop", "Chiby", "Chupa Chup", "Cola", "Cola bonz", "Cola Burger", "Cookies", "Cooktail", "Confetty kiss", "Crunchy Gummies"],
        d: ["Dippy", "Disco Krabby Patties"], 
        e: ["Exotic Mango", "Expert boost"], 
        f: ["Fruit bites", "Frozen Mix", "Frunkfuter", "Fun Gum"],
        g: ["Grape", "Gummy Bear", "Gummy Fang", "G Fries"], 
        h: ["Happy Bear 120 gr"], 
        i: ["Iced Cola", "Inaco"],
        j: ["JFF", "Jungle Fun"], 
        k: ["Krabby Patties", "Krabby Patties 72 gr", "Kuai kuai"],
        l: ["Little Star"], 
        m: ["MB Max", "MB Yupi", "MB Yupi 500gr", "Milly Moose", "Milk Shake", "Mini Monz", "My Watch"],
        n: ["Neon Stix", "Neon Stix 120 gr", "Noodle"], 
        o: ["OFF", "Orange"],
        p: ["Party Mix", "Pastilles", "Pizza", "Puzzle"], 
        q: ["QQ"], 
        r: ["Raspberry & Blackberry"],
        s: ["Sandwich", "Sour Giant Cola 500 gr", "Sour O Ring", "Sea World", "Starlite", "St kiss", "St kiss 45 gr", "St kiss 120 gr", "Sweet Heart"],
        t: ["TJ Joybee", "Tropical"], 
        v: ["Vicee", "Vidoran", "Vitaminis", "Vita C Gummies"],
        w: ["Water Melon", "Worm"], 
        y: ["Yoghurt", "Youvit"]
    };
    
    const setupAutocomplete = (input) => {
        let suggestionBox = document.createElement("div");
        suggestionBox.className = "custom-autocomplete-list";
        input.parentNode.appendChild(suggestionBox);
        input.addEventListener('input', () => {
    const fullVal = input.value;
    // Menggunakan regex agar lebih fleksibel terhadap spasi setelah koma
    const parts = fullVal.split(/,\s*/); 
    const lastPart = parts[parts.length - 1].toLowerCase(); 
    
    if (lastPart.length === 0) { 
        suggestionBox.style.display = "none"; 
        return; 
    }
    
    // Mencari kecocokan berdasarkan huruf pertama
    const firstChar = lastPart[0];
    if (shortcutMap[firstChar]) {
        // Filter daftar berdasarkan apa yang sudah diketik pengguna
        const filtered = shortcutMap[firstChar].filter(item => 
            item.toLowerCase().startsWith(lastPart)
        );

        if (filtered.length > 0) {
            suggestionBox.innerHTML = "";
            suggestionBox.style.display = "block";
            filtered.forEach(item => {
                const div = document.createElement("div");
                div.className = "custom-autocomplete-item";
                div.textContent = item;
                div.onclick = (e) => {
                    e.preventDefault();
                    parts[parts.length - 1] = item;
                    input.value = parts.join(", ");
                    suggestionBox.style.display = "none";
                    input.focus();
                };
                suggestionBox.appendChild(div);
            });
        } else {
            suggestionBox.style.display = "none";
        }
    } else { 
        suggestionBox.style.display = "none"; 
    }
});
        document.addEventListener("click", (e) => { if (e.target !== input) suggestionBox.style.display = "none"; });
    };

    const statusInputs = ["starchless", "ishida", "ishida1", "kawashima", "multipond", "pp3", "dippy", "animal", "animal2", "gfries", "noodle", "berry", "crunchy", "ishida2", "kwshima", "tl", "sandwich", "pp5", "mb5", "max", "rollete"];
    statusInputs.forEach(id => { const el = document.getElementById(id); if (el) setupAutocomplete(el); });
    
    // Fungsi untuk menyimpan semua data input ke localStorage
function saveData() {
    const inputs = document.querySelectorAll('input, select, textarea');
    const data = {};
    
    inputs.forEach(input => {
        // Khusus untuk select2 (multi), kita simpan nilainya sebagai array
        if (input.classList.contains('select2-multi')) {
            data[input.id || 'personil'] = $(input).val();
        } else {
            data[input.id] = input.value;
        }
    });
    
    localStorage.setItem('laporanShiftData', JSON.stringify(data));
}

// Fungsi untuk memuat data dari localStorage saat halaman dimuat
function loadData() {
    const savedData = localStorage.getItem('laporanShiftData');
    if (savedData) {
        const data = JSON.parse(savedData);
        for (const id in data) {
            const el = document.getElementById(id) || document.querySelector(`[name="${id}"]`);
            if (el) {
                if (el.classList.contains('select2-multi')) {
                    $(el).val(data[id]).trigger('change');
                } else {
                    el.value = data[id];
                }
            }
        }
        // Pastikan tampilan area yang dipilih muncul kembali
        pilihArea();
    }
}
    
    function kirimKeWA() {
    // 1. Ambil data dari form umum
    const tanggalInput = document.getElementById("tanggal").value;
    const shift = document.getElementById("shift").value;
    const kerusakan = document.getElementById("kerusakan").value;
    
    // --- PROSES FORMAT HARI & TANGGAL ---
    let tanggalTeks = "-"; 
    if (tanggalInput) {
        const dateObj = new Date(tanggalInput);
        
        // Array nama hari & bulan dalam Bahasa Indonesia
        const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const namaBulan = [
            "Januari", "Februari", "Maret", "April", "Mei", "Juni", 
            "Juli", "Agustus", "September", "Oktober", "November", "Desember"
        ];
        
        const hari = namaHari[dateObj.getDay()];
        const tanggal = dateObj.getDate();
        const bulan = namaBulan[dateObj.getMonth()];
        const tahun = dateObj.getFullYear();
        
        // Hasil format: Senin, 15 Juni 2026
        tanggalTeks = `${hari}, ${tanggal} ${bulan} ${tahun}`;
    }
    // ------------------------------------

    // Ambil data personil
    let personil = [];
    const selectPersonil = document.querySelector(".select2-multi");
    if (selectPersonil) {
        for (let option of selectPersonil.options) {
            if (option.selected) personil.push(option.value);
        }
    }
    
    const area = document.getElementById("area").value;

    // 2. Menyusun format teks pesan WhatsApp (Menggunakan tanggalTeks yang baru)
    let pesan = `*LAPORAN SHIFT TEKNIK PACKING*\n`;
    pesan += `----------------------------------\n`;
    pesan += `*Hari/Tgl:* ${tanggalTeks}\n`;
    pesan += `*Shift:* ${shift}\n`;
    pesan += `*Personil:* ${personil.join(", ")}\n`;
    pesan += `*Area:* ${area}\n`;
    
    if (area === "yupi1") {
    pesan += `\n*Produksi*\n`;
    pesan += `PP : ${document.getElementById("starchless").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jstarchless").value}\n`;
}
    if (area === "yupi34") {
    pesan += `\n*Produksi*\n`;
    pesan += `Ishida 1 : ${document.getElementById("ishida").value}\n`;
    pesan += `Ishida 2 : ${document.getElementById("ishida1").value}\n`;
    pesan += `Kawashima : ${document.getElementById("kawashima").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jkawashima").value}\n`;
    pesan += `Multipond : ${document.getElementById("multipond").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jmultipond").value}\n`;
    pesan += `PP : ${document.getElementById("pp3").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jpp3").value}\n`;
    pesan += `Dippy : ${document.getElementById("dippy").value}\n`;
    pesan += `Animal : ${document.getElementById("animal").value}\n`;
    pesan += `Jumlah : ${document.getElementById("janimal").value}\n`;
    pesan += `Animal line 2 : ${document.getElementById("animal2").value}\n`;
    pesan += `Jumlah : ${document.getElementById("janimal2").value}\n`;
    pesan += `MB/G Fries : ${document.getElementById("gfries").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jgfries").value}\n`;
    pesan += `Cup Sealer : ${document.getElementById("noodle").value}\n`;
    pesan += `Berrybonz : ${document.getElementById("berry").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jberry").value}\n`;
    pesan += `Crunchy : ${document.getElementById("crunchy").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jcrunchy").value}\n`;
}

    if (area === "yupi5") {
    pesan += `\n*Produksi*\n`;
    pesan += `Ishida : ${document.getElementById("ishida2").value}\n`;
    pesan += `Kawashima : ${document.getElementById("kwshima").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jkwshima").value}\n`;
    pesan += `Cup Sealer : ${document.getElementById("tl").value}\n`;
    pesan += `Sandwich : ${document.getElementById("sandwich").value}\n`;
    pesan += `PP : ${document.getElementById("pp5").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jpp5").value}\n`;
    pesan += `MB : ${document.getElementById("mb5").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jmb5").value}\n`;
    pesan += `MB Max : ${document.getElementById("max").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jmax").value}\n`;
    pesan += `Rollete : ${document.getElementById("rollete").value}\n`;
    pesan += `Jumlah : ${document.getElementById("jrollete").value}\n`;
}
    pesan += `\n`;
    pesan += `NOTE PEKERJAAN: \n${kerusakan}\n`;

    // 3. Mengubah teks menjadi format URL link
    const urlWA = "https://api.whatsapp.com/send?text=" + encodeURIComponent(pesan);

    // 4. Buka WhatsApp
    window.open(urlWA, '_blank');
    
    // Hapus data setelah berhasil dikirim
    localStorage.removeItem('laporanShiftData');
    // Opsional: refresh form
    location.reload(); 
}
</script>
</body>
</html>
