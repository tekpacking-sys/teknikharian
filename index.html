<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Laporan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: aliceblue; display: flex; justify-content: center; align-items: center; height: 100vh; }
    
    .form-container {
        width: 96%;
        max-width: 500px;
        height: 80vh;
        background-color: #ffffff;
        border: 1px solid #0003;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    
    .header {
        background: #00796B;
        color: white;
        height: 70px;
        justify-content: center;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 15px;
        position: relative;
        font-size: 18px;
        font-weight: bold;
    }
    
    #btnBack { 
        background: none; 
        border: none; 
        color: white; 
        font-size: 28px; 
        cursor: pointer; 
        position: absolute;
        left: 15px;
        top: 50%; 
        transform: translateY(-50%);
        z-index: 10;
        display: none;
    }
    
    .menu-laporan {
        padding: 20px;
        display: flex;
        flex-direction: column; 
        gap: 20px;
    }    
    .menu-laporan button {
        border: 1px solid #ccc;
        background-color: #fff;
        padding: 15px;
        cursor: pointer;
        box-shadow: rgba(0, 0, 0, 0.16) 0px 3px 6px, rgba(0, 0, 0, 0.23) 0px 3px 6px;
    }  
    
    /*--- Form Induk--*/
    .form-body {
        display: block;
        flex: 1 1 auto; 
        padding: 15px; 
        overflow-y: auto;
        min-height: 0;
    }
    
    /*--- Form Laporan harian--*/
    .judul-input{
        background-color: #368BC1;
        border-radius: 3px;
        color: white;
        padding: 10px;
        display:flex;
        font-weight:bold;
        margin-bottom:10px;
    }
    
    .judul-input span:nth-child(1){
        width:130px;
    }
    
    .judul-input span:nth-child(2),
    .judul-input span:nth-child(3){
        flex:1;
        text-align:center;
    }
    
    .form-row{
        display:flex;
        align-items:center;
        gap:5px;
    }
    
    .machine-name{
        width:130px;
        margin-bottom:0;
    }
    
    .machine-name label{
        margin:0;
        font-weight:bold;
    }
    
    .input-box{
        flex:1;
        margin-bottom:0;
    }
    
    /*--- Form Maintenace--*/
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 3px; font-weight: 600; }
    .form-group input,
    .form-group select,
    .form-group textarea {
        background-color: #fff;
        width: 100%;
        padding: 8px;
        border: 1px solid #0007;
        border-radius: 3px;
    }
    
    .form-footer { background-color: #fff; padding: 16px; border-top: 1px solid #e9ecef; flex-shrink: 0; }
    .btn-submit, .btn-main { width: 100%; background-color: #27ae60; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; }
    .sub { font-size: 18px; font-weight: bold; }
    
    /*--- Halaman Tampilkan Data ---*/
    .filter-section {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }
    .filter-section select {
        flex: 1;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .table-responsive {
        width: 100%;
        overflow-x: auto;
        border: 1px solid #ddd;
        border-radius: 5px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        text-align: left;
    }
    th, td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        white-space: nowrap;
    }
    th {
        background-color: #00796B;
        color: white;
        position: sticky;
        top: 0;
    }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .loading-text { text-align: center; font-weight: bold; padding: 20px; color: #666; }
  </style>
</head>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLHhHhibtR9okOI27Bdp_4UROLkgKRQjIuXhe552IFfocCX-kZo7iteD_NT5p-XG0/exec";
    const daftarSupervisor = ["Ruslan Budi", "Sutarno", "Sudirman", "Saepudin"];
    
    // Variabel Global Baru untuk manajemen mode Edit
    let isEditMode = false;
    let editIdMaint = null; // Menyimpan No ID Maintenance yang diedit
    let currentSheetName = ""; // Menyimpan info nama sheet aktif dari server
    let currentBulanAngka = "";
    let currentTahunAngka = "";

    function showProduksi(){
        document.getElementById("formProduksi").style.display="flex";
        document.getElementById("menuLaporan").style.display="none";
        document.getElementById("btnBack").style.display="block";
        if(!isEditMode) {
            document.getElementById("headerTitle").innerHTML="Form Laporan Harian";
            document.getElementById("submitBtn").textContent = "Simpan";
            document.getElementById("tanggal").disabled = false;
            document.getElementById("shift").disabled = false;
        } else {
            document.getElementById("headerTitle").innerHTML="Edit Laporan Harian";
            document.getElementById("submitBtn").textContent = "Update Data";
            document.getElementById("tanggal").disabled = true; // Kunci kunci primer agar tidak merusak koordinat sel
            document.getElementById("shift").disabled = true;
        }
    }
    
    function showMaintenance(){
        document.getElementById("formMaintenance").style.display="flex";
        document.getElementById("menuLaporan").style.display="none";
        document.getElementById("btnBack").style.display="block";
        if(!isEditMode) {
            document.getElementById("headerTitle").innerHTML="Form Maintenance";
            document.getElementById("btnMainSubmit").textContent = "Simpan";
            document.getElementById("mtTanggal").disabled = false;
            document.getElementById("mtShift").disabled = false;
        } else {
            document.getElementById("headerTitle").innerHTML="Edit Data Maintenance";
            document.getElementById("btnMainSubmit").textContent = "Update Data";
            document.getElementById("mtTanggal").disabled = true;
            document.getElementById("mtShift").disabled = true;
        }
    }
    
    function showDataPage() {
        document.getElementById("pageData").style.display="flex";
        document.getElementById("menuLaporan").style.display="none";
        document.getElementById("btnBack").style.display="block";
        document.getElementById("headerTitle").innerHTML="Data Isian Laporan";
        
        // Inisialisasi isi Dropdown Tahun (Menampilkan tahun ini, 1 tahun lalu, dan 1 tahun ke depan)
        const d = new Date();
        const thnSelect = document.getElementById("filterTahun");
        if (thnSelect.options.length === 0) { // Biar tidak append terus menerus tiap dibuka
            const thnSekarang = d.getFullYear();
            for (let i = thnSekarang - 2; i <= thnSekarang + 1; i++) {
                const opt = document.createElement("option");
                opt.value = i;
                opt.innerText = i;
                if (i === thnSekarang) opt.selected = true;
                thnSelect.appendChild(opt);
            }
            // Set default bulan ke bulan saat ini
            document.getElementById("filterBulan").value = d.getMonth() + 1;
        }

        loadDataFromServer();
    }
    
    function kembaliMenu(){
        document.getElementById("formProduksi").style.display="none";
        document.getElementById("formMaintenance").style.display="none";
        document.getElementById("pageData").style.display="none";
        document.getElementById("menuLaporan").style.display="flex";
        document.getElementById("btnBack").style.display="none";
        document.getElementById("headerTitle").innerHTML="Laporan Teknik Packing";
        
        // Reset state edit ketika kembali ke menu utama
        isEditMode = false;
        editIdMaint = null;
        document.getElementById("formProduksi").reset();
        document.getElementById("formMaintenance").reset();
        isiSupervisor();
    }
        
    function isiSupervisor(){
        const produksi = document.getElementById("supervisor");
        const maintenance = document.getElementById("mtSupervisor");
    
        produksi.innerHTML = '<option value="">-- Pilih Supervisor --</option>';
        maintenance.innerHTML = '<option value="">-- Pilih Supervisor --</option>';
    
        daftarSupervisor.forEach(function(nama){
            produksi.innerHTML += `<option value="${nama}">${nama}</option>`;
            maintenance.innerHTML += `<option value="${nama}">${nama}</option>`;
        });
    }
    
    // AMBIL DATA DARI SERVER (DENGAN FILTER BULAN & TAHUN)
    async function loadDataFromServer() {
        const jenis = document.getElementById("filterJenis").value;
        const bulan = document.getElementById("filterBulan").value;
        const tahun = document.getElementById("filterTahun").value;
        
        const tBody = document.getElementById("tableBody");
        const tHeader = document.getElementById("tableHeader");
        
        tHeader.innerHTML = "";
        tBody.innerHTML = `<tr><td class="loading-text">Memuat data...</td></tr>`;
        
        try {
            // Kirim parameter tambahan &bulan=...&tahun=... ke Web App URL
            const response = await fetch(`${WEB_APP_URL}?jenis=${jenis}&bulan=${bulan}&tahun=${tahun}`);
            const result = await response.json();
            
            if (!result.success || !result.data || result.data.length === 0) {
                tBody.innerHTML = `<tr><td class="loading-text">Tidak ada data ditemukan untuk bulan & tahun ini.</td></tr>`;
                return;
            }
            
            const rawData = result.data;
            tBody.innerHTML = ""; 

            // Simpan info bulan & tahun aktif yang dipilih oleh user untuk kebutuhan edit data
            const bIndo = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            currentSheetName = bIndo[Number(bulan) - 1] + ' ' + tahun;
            currentBulanAngka = bulan;
            currentTahunAngka = tahun;
    
            if (jenis === "produksi") {
                const tanggalCounts = {};
                rawData.forEach(row => {
                    let tgl = row[4] !== undefined ? String(row[4]) : "-";
                    if (tgl.includes("/")) {
                        tgl = tgl.split(" ")[0].split("/")[0];
                    }
                    tanggalCounts[tgl] = (tanggalCounts[tgl] || 0) + 1;
                });

                const skemaProduksi = [
                    { label: "AKSI", key: "aksi", type: "action" },
                    { label: "TANGGAL", key: "tanggal", type: "meta", indexCol: 4 },
                    { label: "SHIFT", key: "shift", type: "meta", indexCol: 5 },

        }

    function ambilNilaiDariLog(logString, key) {
        if (!logString || logString === "-") return "";
        const pasangan = logString.split(", ");
        for (let i = 0; i < pasangan.length; i++) {
            const part = pasangan[i].split(":");
            if (part[0].trim() === key) {
                return part[1] ? part[1].trim() : "";
            }
        }
        return "";
    }

    // ==========================================
    // PARSING DATA LAMA MASUK KE FORM INPUT
    // ==========================================
    function pemicuEditProduksi(rawData, rowIndex) {
        isEditMode = true;
        const row = rawData[rowIndex];
        
        document.getElementById("pageData").style.display = "none";
        showProduksi();

        // Isi field Meta
        document.getElementById("tanggal").value = row[4];
        document.getElementById("shift").value = row[5];
        document.getElementById("supervisor").value = row[2] === "-" ? "" : row[2];

        // List id elemen input di form produksi Anda
        const keys = [
            "starchless", "bdStarchless", "hassia", "kawashima", "multipond", "bdMultipond",
            "pp", "bdPP", "crunchy", "bdCrunchy", "animal", "bdAnimal", "zugi", "bdZugi",
            "dippy", "bdDippy", "animal2", "bdAnimal2", "noodle", "bdNoodle", "berrybonz",
            "bdBerrybonz", "fries", "bdFries", "mb", "bdMB", "mywatch", "bdMyWatch",
            "ishida", "bdIshida", "cupsealer", "bdCupSealer", "rollete", "bdRollete",
            "pp5", "bdPP5", "mb5", "bdMB5", "mb35", "bdMB35", "max", "bdMax", "gfries", "bdGFries"
        ];

        // Bersihkan dulu isi form lama
        keys.forEach(k => document.getElementById(k).value = "");

        // Parsing String Log ("starchless:10, multipond:5") ke masing-masing box input
        ["mesin", "breakdown"].forEach(t => {
            let logString = (t === "mesin") ? (row[6] || "") : (row[7] || "");
            if(logString && logString !== "-") {
                logString.split(", ").forEach(pasang => {
                    let part = pasang.split(":");
                    if(part[0] && document.getElementById(part[0].trim())) {
                        document.getElementById(part[0].trim()).value = part[1] ? part[1].trim() : "";
                    }
                });
            }
        });
    }

    function pemicuEditMaintenance(no, tanggal, shift, area, mesin, remark, supervisor) {
        isEditMode = true;
        editIdMaint = no;

        document.getElementById("pageData").style.display = "none";
        showMaintenance();

        // Ubah format dd/mm/yyyy dari tabel menjadi yyyy-mm-dd agar bisa dibaca <input type="date">
        if (tanggal.includes("/")) {
            const p = tanggal.split("/");
            document.getElementById("mtTanggal").value = `${p[2]}-${p[1]}-${p[0]}`;
        }
        
        document.getElementById("mtShift").value = shift;
        document.getElementById("mtArea").value = area === "-" ? "" : area;
        document.getElementById("mtMesin").value = mesin === "-" ? "" : mesin;
        document.getElementById("mtRemark").value = remark === "-" ? "" : remark;
        document.getElementById("mtSupervisor").value = supervisor === "-" ? "" : supervisor;
    }

        if (data.supervisor == "") { alert("Silakan pilih supervisor"); return; }
    
        submitBtn.disabled = true;
        submitBtn.textContent = "Menyimpan...";
    
        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(data)

            if (result.success){

    // SUBMIT FORM MAINTENANCE (DENGAN LOGIKA INPUT DAN UPDATE)
    document.getElementById("formMaintenance").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const inputTanggal = document.getElementById("mtTanggal").value;
        const shift = document.getElementById("mtShift").value;
        const supervisor = document.getElementById("mtSupervisor").value;
        const btnMainSubmit = document.getElementById("btnMainSubmit");
    
        if (!inputTanggal) { alert("Silakan pilih tanggal terlebih dahulu"); return; }

        btnMainSubmit.disabled = true;
        btnMainSubmit.textContent = "Menyimpan...";
    
        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
